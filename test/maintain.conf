# Claude Maintain configuration
# Sourced by ~/.claude/maintain.sh

# Directories to exclude (projects under these paths will be skipped)
EXCLUDE_DIRS=(
    "/mnt/9/gt"
    "/mnt/03244/gt"
)

# Directories to include even if under EXCLUDE_DIRS (whitelist overrides blacklist)
# Example: exclude all of /mnt/9/gt but still maintain one specific project:
INCLUDE_DIRS=(
    "/mnt/9/gt/rig_support_messages_assistent/mayor/rig"
)

# Path component patterns to exclude — skip project if ANY directory in its path
# contains the pattern as substring. Checked after INCLUDE_DIRS (include wins).
# Example: "polecats" skips /mnt/9/gt/rig_Aha/polecats/chrome/rig_Aha
EXCLUDE_PATTERNS=(
    "polecats"
    "witness"
    "refinery"
)

# Verbose output to stdout (true = detailed, false = only errors/warnings)
VERBOSE=true

# Max maintenance runs per project per day
MAX_DAILY=1

# Ignore files to respect in each project (patterns from these files are skipped)
IGNORE_FILES=(".gitignore" ".cgrignore" ".claudeignore")

# Model to use for maintenance tasks (sonnet = fast & cheap)
MODEL="sonnet"

# Max budget per project per run (USD)
MAX_BUDGET="0.50"

# Only process projects with file changes in the last N hours (0 = disabled)
ACTIVITY_HOURS=3
