    { label: "Skill Auto-Detection", desc: "Только keyword matching. Нет семантического понимания.", severity: "medium" },
    { label: "Auto L1 Loading", desc: "Claude сам решает загружать ли L1. Нет авто-подгрузки по задаче.", severity: "low" },
    { label: "Auto Red Zone Detection", desc: "Red zones определяются только вручную при init.", severity: "low" },
  ],
};

const statusIcon = (s) => s === "ok" ? "✅" : s === "warn" ? "⚠️" : "❌";
const statusColor = (s) => s === "ok" ? GREEN : s === "warn" ? YELLOW : RED;
const statusLabel = (s) => s === "ok" ? "Готово" : s === "warn" ? "Частично" : "Не готово";
const sevColor = (s) => s === "high" ? RED : s === "medium" ? YELLOW : DIM;
const sevLabel = (s) => s === "high" ? "Важно" : s === "medium" ? "Средне" : "Низкий";

function EntityCard({ e, selected, onClick }) {
  return (
    <div onClick={onClick} style={{
      background: selected ? `${e.color}15` : CARD,
      border: `2px solid ${selected ? e.color : BORDER}`,
      borderRadius: 14, padding: "16px 18px", cursor: "pointer",
      transition: "all 0.25s ease", transform: selected ? "scale(1.01)" : "scale(1)",
    }}>
      <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 4 }}>
        <span style={{ fontSize: 28 }}>{e.icon}</span>
        <div style={{ flex: 1 }}>
          <div style={{ fontSize: 17, fontWeight: 700, color: TEXT }}>{e.label}</div>
          <div style={{ fontSize: 12, color: DIM }}>{e.oneLiner}</div>
        </div>
        <span style={{ fontSize: 16 }}>{statusIcon(e.details.status)}</span>
      </div>
      {!selected && <div style={{ fontSize: 11, color: `${e.color}aa`, marginTop: 4 }}>Нажми чтобы раскрыть →</div>}
    </div>
  );
}

function EntityDetails({ e }) {
  const d = e.details;
  const S = { marginBottom: 16 };
  const L = { fontSize: 11, color: DIM, textTransform: "uppercase", letterSpacing: 1, marginBottom: 6, fontWeight: 600 };
  return (
    <div style={{ background: `${e.color}08`, border: `1px solid ${e.color}30`, borderRadius: 14, padding: 20, animation: "fadeIn 0.3s ease" }}>
      <div style={S}><div style={L}>Что это простыми словами</div><div style={{ fontSize: 14, color: TEXT, lineHeight: 1.6 }}>{d.what}</div></div>
      <div style={{ ...S, background: `${e.color}10`, borderRadius: 10, padding: "12px 14px", borderLeft: `3px solid ${e.color}` }}>
        <div style={{ fontSize: 11, color: e.color, fontWeight: 600, marginBottom: 4 }}>💡 АНАЛОГИЯ</div>
        <div style={{ fontSize: 13, color: TEXT, lineHeight: 1.5 }}>{d.analogy}</div>
      </div>
      <div style={S}><div style={L}>Что у него внутри</div>
        <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
          {d.hasWhat.map((a, i) => <div key={i} style={{ fontSize: 12, background: `${e.color}12`, color: TEXT, padding: "6px 10px", borderRadius: 6, border: `1px solid ${e.color}20`, lineHeight: 1.4 }}>{a}</div>)}
        </div>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 16 }}>
        <div style={{ background: CARD, borderRadius: 10, padding: "10px 14px", border: `1px solid ${BORDER}` }}>
          <div style={{ fontSize: 10, color: DIM, marginBottom: 3 }}>ОТКУДА БЕРЁТСЯ</div>
          <div style={{ fontSize: 12, color: ACCENT, lineHeight: 1.4 }}>{d.whereFrom}</div>
        </div>
        <div style={{ background: CARD, borderRadius: 10, padding: "10px 14px", border: `1px solid ${BORDER}` }}>
          <div style={{ fontSize: 10, color: DIM, marginBottom: 3 }}>СКОЛЬКО</div>
          <div style={{ fontSize: 12, color: ACCENT, lineHeight: 1.4 }}>{d.count}</div>
        </div>
      </div>
      {d.examples && <div style={S}><div style={L}>Примеры</div>
        {d.examples.map((ex, i) => <div key={i} style={{ fontSize: 12, color: "#9ca3af", padding: "6px 10px", borderLeft: `2px solid ${e.color}40`, marginBottom: 4, lineHeight: 1.5 }}>{ex}</div>)}
      </div>}
      <div style={{ display: "flex", alignItems: "center", gap: 8, padding: "8px 12px", borderRadius: 8, background: `${statusColor(d.status)}15`, border: `1px solid ${statusColor(d.status)}30` }}>
        <span style={{ fontSize: 16 }}>{statusIcon(d.status)}</span>
        <span style={{ fontSize: 12, color: statusColor(d.status), fontWeight: 600 }}>{statusLabel(d.status)}</span>
        <span style={{ fontSize: 12, color: DIM, marginLeft: 4 }}>{d.statusText}</span>
      </div>
    </div>
  );
}

function ProcessCard({ p, expanded, onClick }) {
  return (
    <div>
      <div onClick={onClick} style={{
        display: "flex", alignItems: "center", gap: 12,
        padding: "12px 14px", borderRadius: 10, cursor: "pointer",
        background: expanded ? `${CARD}` : CARD, border: `1px solid ${expanded ? ACCENT + "40" : BORDER}`,
        transition: "all 0.2s",
      }}>
        <span style={{ fontSize: 24 }}>{p.icon}</span>
        <div style={{ flex: 1 }}>
          <div style={{ fontSize: 15, fontWeight: 600, color: TEXT }}>{p.label}</div>
          <div style={{ fontSize: 12, color: DIM }}>{p.desc}</div>
        </div>
        <div style={{ textAlign: "right" }}>
          <div style={{ fontSize: 11, color: ACCENT }}>{p.input} → {p.output}</div>
          <div style={{ fontSize: 11, color: statusColor(p.status), display: "flex", alignItems: "center", gap: 4, justifyContent: "flex-end" }}>
            {statusIcon(p.status)} {p.steps.filter(s=>s.done).length}/{p.steps.length}
          </div>
        </div>
      </div>
      {expanded && (
        <div style={{ padding: "10px 14px 10px 50px", animation: "fadeIn 0.3s ease" }}>
          {p.steps.map((s, i) => (
            <div key={i} style={{ display: "flex", gap: 8, padding: "5px 0", fontSize: 13, color: s.done ? "#9ca3af" : RED }}>
              <span style={{ color: s.done ? GREEN : RED, fontSize: 12 }}>{s.done ? "✓" : "✗"}</span>
              <span>{s.text}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function App() {
  const [view, setView] = useState("map");
  const [selected, setSelected] = useState(null);
  const [expandedProc, setExpandedProc] = useState(null);

  return (
    <div style={{ background: BG, color: TEXT, minHeight: "100vh", fontFamily: "'DM Sans', -apple-system, sans-serif", padding: "20px 16px" }}>
      <div style={{ maxWidth: 680, margin: "0 auto" }}>

        {/* Header */}
        <div style={{ marginBottom: 20 }}>
          <div style={{ fontSize: 13, color: DIM, textTransform: "uppercase", letterSpacing: 2, marginBottom: 4 }}>Навигатор проекта</div>
          <div style={{ display: "flex", alignItems: "baseline", gap: 10 }}>
            <span style={{ fontSize: 26, fontWeight: 800, color: TEXT }}>{project.name}</span>
            <span style={{ fontSize: 13, color: DIM }}>v{project.version}</span>
          </div>
          <div style={{ fontSize: 14, color: ACCENT, marginTop: 6, padding: "8px 12px", background: `${ACCENT}10`, borderRadius: 8, borderLeft: `3px solid ${ACCENT}` }}>
            🎯 {project.goal}
          </div>
          <div style={{ display: "flex", gap: 12, marginTop: 12, flexWrap: "wrap" }}>
            {Object.entries(project.stats).map(([k, v]) => (
              <div key={k} style={{ background: CARD, border: `1px solid ${BORDER}`, borderRadius: 8, padding: "6px 12px", fontSize: 12 }}>
                <span style={{ color: ACCENT, fontWeight: 700 }}>{v}</span> <span style={{ color: DIM }}>{k}</span>
              </div>
            ))}
          </div>
        </div>

        {/* Tabs */}
        <div style={{ display: "flex", gap: 4, marginBottom: 20, background: CARD, borderRadius: 10, padding: 3 }}>
          {[
            { id: "map", label: "🗺 Из чего состоит" },
            { id: "process", label: "⚡ Что происходит" },
            { id: "gaps", label: "🚨 Что не готово" },
          ].map(t => (
            <button key={t.id} onClick={() => { setView(t.id); setSelected(null); setExpandedProc(null); }}
              style={{ flex: 1, padding: "10px 0", border: "none", borderRadius: 8, fontSize: 13, fontWeight: 600, cursor: "pointer",
                background: view === t.id ? ACCENT : "transparent", color: view === t.id ? BG : DIM, transition: "all 0.2s" }}>
              {t.label}
            </button>
          ))}
        </div>

        {/* MAP */}
        {view === "map" && (
          <div>
            <div style={{ fontSize: 12, color: DIM, marginBottom: 12 }}>Нажми на любой блок чтобы узнать подробности — что это, зачем, как работает</div>
            {project.entities.map((e, i) => (
              <div key={e.id}>
                <EntityCard e={e} selected={selected === i} onClick={() => setSelected(selected === i ? null : i)} />
                {selected === i && <div style={{ margin: "8px 0" }}><EntityDetails e={e} /></div>}
                {i < project.entities.length - 1 && (
                  <div style={{ display: "flex", flexDirection: "column", alignItems: "center", padding: "6px 0" }}>
                    <div style={{ fontSize: 11, color: project.entities[i].color, background: `${project.entities[i].color}15`, padding: "3px 12px", borderRadius: 20 }}>
                      ↓ {project.flow[i]?.label}
                    </div>
                  </div>
                )}
              </div>
            ))}
          </div>
        )}

        {/* PROCESS */}
        {view === "process" && (
          <div>
            <div style={{ fontSize: 12, color: DIM, marginBottom: 12 }}>Нажми на процесс чтобы увидеть шаги и статус каждого</div>
            <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
              {project.processes.map((p, i) => (
                <div key={i}>
                  <ProcessCard p={p} expanded={expandedProc === i} onClick={() => setExpandedProc(expandedProc === i ? null : i)} />
                  {i < project.processes.length - 1 && (
                    <div style={{ display: "flex", justifyContent: "center", padding: "4px 0" }}>
                      <span style={{ color: DIM, fontSize: 14 }}>↓</span>
                    </div>
                  )}
                </div>
              ))}
            </div>
          </div>
        )}

        {/* GAPS */}
        {view === "gaps" && (
          <div>
            <div style={{ fontSize: 12, color: DIM, marginBottom: 12 }}>Что не реализовано или работает частично</div>
            <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
              {project.gaps.map((g, i) => (
                <div key={i} style={{
                  background: `${sevColor(g.severity)}10`, border: `1px solid ${sevColor(g.severity)}30`,
                  borderRadius: 10, padding: "12px 16px",
                }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
                    <span style={{ fontSize: 14, fontWeight: 700, color: sevColor(g.severity) }}>{g.label}</span>
                    <span style={{ fontSize: 10, padding: "2px 8px", borderRadius: 8, background: `${sevColor(g.severity)}20`, color: sevColor(g.severity), fontWeight: 600 }}>{sevLabel(g.severity)}</span>
                  </div>
                  <div style={{ fontSize: 13, color: "#9ca3af", lineHeight: 1.5 }}>{g.desc}</div>
                </div>
              ))}
            </div>

            <div style={{ marginTop: 20, padding: 14, borderRadius: 10, background: `${RED}10`, border: `1px solid ${RED}30` }}>
              <div style={{ fontSize: 13, fontWeight: 600, color: RED, marginBottom: 4 }}>⚡ Самая важная дыра</div>
              <div style={{ fontSize: 13, color: TEXT, lineHeight: 1.5 }}>
                <b>Skill Chaining</b> — сейчас пользователь вручную вызывает brainstorm, потом plan, потом execute.
                Автоцепочка сэкономила бы 3 ручных действия на каждую фичу.
              </div>
            </div>
          </div>
        )}

        {/* Legend */}
        <div style={{ marginTop: 24, padding: 14, borderRadius: 10, background: CARD, border: `1px solid ${BORDER}` }}>
          <div style={{ fontSize: 11, color: DIM, marginBottom: 8, fontWeight: 600 }}>ОБОЗНАЧЕНИЯ</div>
          <div style={{ display: "flex", gap: 16, flexWrap: "wrap" }}>
            {[
              { icon: "✅", label: "Готово", color: GREEN },
              { icon: "⚠️", label: "Частично", color: YELLOW },
              { icon: "❌", label: "Не готово", color: RED },
            ].map(s => (
              <div key={s.label} style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 12, color: s.color }}>{s.icon} {s.label}</div>
            ))}
          </div>
        </div>

        <div style={{ marginTop: 16, textAlign: "center", fontSize: 12, color: DIM, lineHeight: 1.6 }}>
          Forge Plugin v{project.version} — Project Navigator<br />
          Этот формат может стать скиллом /forge:product-map
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
