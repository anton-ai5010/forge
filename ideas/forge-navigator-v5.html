<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forge — Navigator v5</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0d1117; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;
const A = "#4dd0e1", BG = "#0d1117", CARD = "#161b22", BRD = "#30363d", DIM = "#7d8590", TXT = "#e6edf3",
  GRN = "#3fb950", YEL = "#d29922", RED = "#f85149", BLU = "#58a6ff", PUR = "#bc8cff", ORG = "#f0883e", PNK = "#f778ba";

const statusIcon = s => s==="ok"?"✅":s==="warn"?"⚠️":"❌";
const statusColor = s => s==="ok"?GRN:s==="warn"?YEL:RED;
const statusLabel = s => s==="ok"?"Готово":s==="warn"?"Частично":"Не готово";
const sevColor = s => s==="high"?RED:s==="medium"?YEL:DIM;
const sevLabel = s => s==="high"?"Важно":s==="medium"?"Средне":"Мелочь";

// Sub-item that can expand
function Sub({ text, children, warn, pink }) {
  const [open, setOpen] = useState(false);
  const hasKids = !!children;
  const borderColor = pink ? PNK : open ? A : `${BRD}60`;
  return (
    <div style={{marginBottom:4}}>
      <div onClick={hasKids?()=>setOpen(!open):undefined} style={{
        fontSize:13, color: warn ? YEL : pink ? PNK : "#b0b8c8", lineHeight:1.6, padding:"6px 10px", borderRadius:6,
        cursor: hasKids?"pointer":"default", background: open ? (pink?`${PNK}08`:`${BLU}06`) : "transparent",
        borderLeft:`2px solid ${borderColor}`, transition:"all 0.15s",
      }}>
        {hasKids && <span style={{color:DIM,fontSize:9,marginRight:6}}>{open?"▼":"▶"}</span>}
        {warn && "⚠️ "}
        {pink && "🔍 "}
        {text}
      </div>
      {open && hasKids && <div style={{padding:"6px 8px 6px 22px",animation:"fadeIn 0.15s ease"}}>{children}</div>}
    </div>
  );
}

// Code block
function Code({ children }) {
  return <pre style={{fontSize:11,color:A,background:"#0a0c10",border:`1px solid ${BRD}`,borderRadius:8,padding:"12px 14px",overflow:"auto",lineHeight:1.6,fontFamily:"'Courier New',monospace",whiteSpace:"pre-wrap",wordBreak:"break-word",marginBottom:8}}>{children}</pre>;
}

// Main entity card (v2 style)
function EntityCard({ e, selected, onClick }) {
  return (
    <div onClick={onClick} style={{
      background: selected ? `${e.color}15` : CARD, border:`2px solid ${selected?e.color:BRD}`,
      borderRadius:14, padding:"16px 18px", cursor:"pointer", transition:"all 0.25s ease",
      transform: selected?"scale(1.01)":"scale(1)",
    }}>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <span style={{fontSize:28}}>{e.icon}</span>
        <div style={{flex:1}}>
          <div style={{fontSize:17,fontWeight:700,color:TXT}}>{e.label}</div>
          <div style={{fontSize:12,color:DIM}}>{e.oneLiner}</div>
        </div>
        <span style={{fontSize:16}}>{statusIcon(e.status)}</span>
      </div>
      {!selected && <div style={{fontSize:11,color:`${e.color}aa`,marginTop:6}}>Нажми чтобы раскрыть →</div>}
    </div>
  );
}

// v2 style detail panel with drill-down
function EntityDetails({ e }) {
  const d = e.details;
  const L = {fontSize:11,color:DIM,textTransform:"uppercase",letterSpacing:1,marginBottom:6,fontWeight:600};
  return (
    <div style={{background:`${e.color}08`,border:`1px solid ${e.color}30`,borderRadius:14,padding:20,animation:"fadeIn 0.3s ease"}}>
      {/* Что это */}
      <div style={{marginBottom:16}}>
        <div style={L}>Что это</div>
        <div style={{fontSize:14,color:TXT,lineHeight:1.6}}>{d.what}</div>
      </div>

      {/* Что тебе с этого */}
      <div style={{marginBottom:16,background:`${GRN}10`,borderRadius:10,padding:"12px 14px",borderLeft:`3px solid ${GRN}`}}>
        <div style={{fontSize:11,color:GRN,fontWeight:600,marginBottom:4}}>💰 ЧТО ТЕБЕ С ЭТОГО</div>
        <div style={{fontSize:13,color:TXT,lineHeight:1.5}}>{d.benefit}</div>
      </div>

      {/* Как пользоваться */}
      <div style={{marginBottom:16}}>
        <div style={L}>Как пользоваться</div>
        {d.howTo.map((h,i) => <div key={i} style={{fontSize:13,color:TXT,padding:"6px 10px",borderRadius:6,background:`${BLU}10`,border:`1px solid ${BLU}15`,lineHeight:1.4,marginBottom:3}}>
          <span style={{color:BLU,marginRight:6}}>{i+1}.</span>{h}
        </div>)}
      </div>

      {/* Что внутри — drill-down items */}
      {d.inside && <div style={{marginBottom:16}}>
        <div style={L}>Что внутри (нажми для подробностей)</div>
        {d.inside.map((item,i) => typeof item === "string"
          ? <Sub key={i} text={item} />
          : <Sub key={i} text={item.text} warn={item.warn} pink={item.pink}>{item.children}</Sub>
        )}
      </div>}

      {/* Статус */}
      <div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",borderRadius:8,background:`${statusColor(e.status)}15`,border:`1px solid ${statusColor(e.status)}30`}}>
        <span style={{fontSize:16}}>{statusIcon(e.status)}</span>
        <span style={{fontSize:12,color:statusColor(e.status),fontWeight:600}}>{statusLabel(e.status)}</span>
        <span style={{fontSize:12,color:DIM,marginLeft:4}}>{d.statusText}</span>
      </div>
    </div>
  );
}

// Process card (v2 style with drill-down)
function ProcessCard({ p, expanded, onClick }) {
  return (
    <div>
      <div onClick={onClick} style={{
        display:"flex",alignItems:"center",gap:12,padding:"12px 14px",borderRadius:10,cursor:"pointer",
        background:expanded?`${A}08`:CARD,border:`1px solid ${expanded?A+"40":BRD}`,transition:"all 0.2s",
      }}>
        <span style={{fontSize:24}}>{p.icon}</span>
        <div style={{flex:1}}>
          <div style={{fontSize:15,fontWeight:600,color:TXT}}>{p.label}</div>
          <div style={{fontSize:12,color:DIM,lineHeight:1.4}}>{p.what}</div>
        </div>
        <div style={{textAlign:"right"}}>
          <div style={{fontSize:11,color:statusColor(p.status)}}>{statusIcon(p.status)} {p.doneCount}/{p.totalCount}</div>
        </div>
      </div>
      {expanded && (
        <div style={{padding:"12px 16px",animation:"fadeIn 0.3s ease"}}>
          <div style={{marginBottom:12,background:`${GRN}10`,borderRadius:8,padding:"10px 12px",borderLeft:`3px solid ${GRN}`}}>
            <div style={{fontSize:11,color:GRN,fontWeight:600,marginBottom:3}}>💰 ЧТО ТЕБЕ С ЭТОГО</div>
            <div style={{fontSize:13,color:TXT,lineHeight:1.4}}>{p.benefit}</div>
          </div>
          <div style={{marginBottom:12,background:`${BLU}10`,borderRadius:8,padding:"10px 12px",borderLeft:`3px solid ${BLU}`}}>
            <div style={{fontSize:11,color:BLU,fontWeight:600,marginBottom:3}}>⌨️ КАК ЗАПУСТИТЬ</div>
            <div style={{fontSize:13,color:TXT,lineHeight:1.4}}>{p.howTo}</div>
          </div>
          <div style={{fontSize:11,color:DIM,fontWeight:600,textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>Шаги (нажми для подробностей)</div>
          {p.steps.map((s,i) => typeof s === "string" || !s.children
            ? <div key={i} style={{display:"flex",gap:8,padding:"5px 0",fontSize:13,color:s.done===false?RED:"#9ca3af"}}>
                <span style={{color:s.done===false?RED:GRN,fontSize:12,flexShrink:0,marginTop:2}}>{s.done===false?"✗":"✓"}</span>
                <span>{s.text||s}</span>
              </div>
            : <Sub key={i} text={`${s.done===false?"❌":"✅"} ${s.text}`} warn={s.done===false}>{s.children}</Sub>
          )}
          {p.underHood && <Sub text={p.underHood.title} pink={true}>
            {p.underHood.explanation && <div style={{fontSize:12,color:"#9ca3af",marginBottom:8,lineHeight:1.5}}>{p.underHood.explanation}</div>}
            <Code>{p.underHood.code}</Code>
          </Sub>}
        </div>
      )}
    </div>
  );
}

// ====== DATA ======

        "23 скилла: 7 процессных, 5 специализированных, 4 исполнительных, 4 завершающих, 3 документационных",

      statusText: "Все 23 работают, автоподбор по словам",
    },
  },

    details: {
