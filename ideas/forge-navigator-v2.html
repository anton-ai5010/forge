      benefit: "Интерфейс выглядит профессионально и консистентно, а не 'каждая страница разная'.",
      howTo: "Напиши /forge:design и опиши какой интерфейс нужен",
      status: "ok",
      steps: [
        { text: "Анализ: кто будет пользоваться", done: true },
        { text: "Поиск подходящих паттернов дизайна", done: true },
        { text: "Цветовая палитра + шрифты + отступы", done: true },
        { text: "Компоненты + доступность для людей с ограничениями", done: true },
      ],
    },
    {
      label: "Проверка безопасности",
      icon: "🔐",
      what: "Проверка кода по чеклисту уязвимостей — если не пройдена, нельзя выпускать",
      benefit: "Не пропустишь утечку паролей, SQL-инъекцию или незащищённый API.",
      howTo: "Перед выпуском: /forge:security-review",
      status: "ok",
      steps: [
        { text: "Проверка: нет ли паролей и ключей в коде", done: true },
        { text: "Проверка: защищён ли ввод от взлома (XSS, SQL-инъекции)", done: true },
        { text: "Проверка: работает ли авторизация правильно", done: true },
        { text: "Проверка: защищены ли API, зависимости, данные пользователей", done: true },
        { text: "СТОП: если хоть одна проверка не пройдена — выпускать нельзя", done: true },
      ],
    },
  ],

  gaps: [
    { label: "Автоцепочка команд", desc: "Сейчас ты вручную вызываешь brainstorm, потом plan, потом execute. Должно быть автоматически — одна команда запускает всю цепочку.", severity: "high" },
    { label: "Удалённый магазин скиллов", desc: "Поиск новых скиллов работает только среди уже скачанных. Нельзя найти и установить новый скилл из интернета.", severity: "medium" },
    { label: "Автоизвлечение выводов", desc: "Claude не анализирует ошибки и коммиты автоматически. Выводы записываются только вручную через /forge:sync.", severity: "medium" },
    { label: "Умный подбор скиллов", desc: "Сейчас подбор по ключевым словам: 'баг' → отладка. Не понимает контекст: 'что-то не работает' — не подскажет.", severity: "medium" },
    { label: "Обмен опытом между проектами", desc: "Книга ошибок и решения хранятся в каждом проекте отдельно. Выводы из одного проекта не переносятся в другой.", severity: "low" },
    { label: "Автозагрузка контекста по теме", desc: "Claude не всегда сам загружает нужные детали. Иногда приходится просить 'посмотри решения'.", severity: "low" },
    { label: "Автоопределение опасных зон", desc: "При настройке проекта ты сам указываешь критичные файлы. Claude мог бы определить их автоматически.", severity: "low" },
  ],
};

const statusIcon = (s) => s === "ok" ? "✅" : s === "warn" ? "⚠️" : "❌";
const statusColor = (s) => s === "ok" ? GREEN : s === "warn" ? YELLOW : RED;
const statusLabel = (s) => s === "ok" ? "Готово" : s === "warn" ? "Частично" : "Не готово";
const sevColor = (s) => s === "high" ? RED : s === "medium" ? YELLOW : DIM;
const sevLabel = (s) => s === "high" ? "Важно" : s === "medium" ? "Средне" : "Мелочь";

function EntityCard({ e, selected, onClick }) {
  return (
    <div onClick={onClick} style={{
      background: selected ? `${e.color}15` : CARD,
      border: `2px solid ${selected ? e.color : BORDER}`,
      borderRadius: 14, padding: "16px 18px", cursor: "pointer",
      transition: "all 0.25s ease", transform: selected ? "scale(1.01)" : "scale(1)",
    }}>
      <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
        <span style={{ fontSize: 28 }}>{e.icon}</span>
        <div style={{ flex: 1 }}>
          <div style={{ fontSize: 17, fontWeight: 700, color: TEXT }}>{e.label}</div>
          <div style={{ fontSize: 12, color: DIM }}>{e.oneLiner}</div>
        </div>
        <span style={{ fontSize: 16 }}>{statusIcon(e.details.status)}</span>
      </div>
      {!selected && <div style={{ fontSize: 11, color: `${e.color}aa`, marginTop: 6 }}>Нажми чтобы раскрыть →</div>}
    </div>
  );
}

function EntityDetails({ e }) {
  const d = e.details;
  const S = { marginBottom: 18 };
  const L = { fontSize: 11, color: DIM, textTransform: "uppercase", letterSpacing: 1, marginBottom: 6, fontWeight: 600 };
  return (
    <div style={{ background: `${e.color}08`, border: `1px solid ${e.color}30`, borderRadius: 14, padding: 20, animation: "fadeIn 0.3s ease" }}>

      <div style={S}>
        <div style={L}>Что это</div>
        <div style={{ fontSize: 14, color: TEXT, lineHeight: 1.6 }}>{d.what}</div>
      </div>

      <div style={{ ...S, background: `${GREEN}10`, borderRadius: 10, padding: "12px 14px", borderLeft: `3px solid ${GREEN}` }}>
        <div style={{ fontSize: 11, color: GREEN, fontWeight: 600, marginBottom: 4 }}>💰 ЧТО ТЕБЕ С ЭТОГО</div>
        <div style={{ fontSize: 13, color: TEXT, lineHeight: 1.5 }}>{d.benefit}</div>
      </div>

      <div style={S}>
        <div style={L}>Как пользоваться</div>
        <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
          {d.howTo.map((h, i) => <div key={i} style={{ fontSize: 13, color: TEXT, padding: "6px 10px", borderRadius: 6, background: `${BLUE}10`, border: `1px solid ${BLUE}15`, lineHeight: 1.4 }}>
            <span style={{ color: BLUE, marginRight: 6 }}>{i + 1}.</span>{h}
          </div>)}
        </div>
      </div>

      <div style={S}>
        <div style={L}>Что внутри</div>
        <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
          {d.inside.map((a, i) => <div key={i} style={{ fontSize: 12, color: "#9ca3af", padding: "6px 10px", borderLeft: `2px solid ${e.color}40`, lineHeight: 1.5 }}>{a}</div>)}
        </div>
      </div>

      <div style={{ display: "flex", alignItems: "center", gap: 8, padding: "8px 12px", borderRadius: 8, background: `${statusColor(d.status)}15`, border: `1px solid ${statusColor(d.status)}30` }}>
        <span style={{ fontSize: 16 }}>{statusIcon(d.status)}</span>
        <span style={{ fontSize: 12, color: statusColor(d.status), fontWeight: 600 }}>{statusLabel(d.status)}</span>
        <span style={{ fontSize: 12, color: DIM, marginLeft: 4 }}>{d.statusText}</span>
      </div>
    </div>
  );
}

function ProcessCard({ p, expanded, onClick }) {
  return (
    <div>
      <div onClick={onClick} style={{
        padding: "14px 16px", borderRadius: 12, cursor: "pointer",
        background: expanded ? `${ACCENT}08` : CARD,
        border: `1px solid ${expanded ? ACCENT + "40" : BORDER}`,
        transition: "all 0.2s",
      }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <span style={{ fontSize: 24 }}>{p.icon}</span>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 15, fontWeight: 600, color: TEXT }}>{p.label}</div>
            <div style={{ fontSize: 12, color: DIM, lineHeight: 1.4 }}>{p.what}</div>
          </div>
          <div style={{ textAlign: "right" }}>
            <div style={{ fontSize: 11, color: statusColor(p.status) }}>{statusIcon(p.status)} {p.steps.filter(s => s.done).length}/{p.steps.length}</div>
          </div>
        </div>
        {!expanded && <div style={{ fontSize: 11, color: `${ACCENT}88`, marginTop: 6, marginLeft: 34 }}>Нажми чтобы раскрыть →</div>}
      </div>
      {expanded && (
        <div style={{ padding: "12px 16px", animation: "fadeIn 0.3s ease" }}>
          <div style={{ background: `${GREEN}10`, borderRadius: 8, padding: "10px 12px", borderLeft: `3px solid ${GREEN}`, marginBottom: 12 }}>
            <div style={{ fontSize: 11, color: GREEN, fontWeight: 600, marginBottom: 3 }}>💰 ЧТО ТЕБЕ С ЭТОГО</div>
            <div style={{ fontSize: 13, color: TEXT, lineHeight: 1.4 }}>{p.benefit}</div>
          </div>
          <div style={{ background: `${BLUE}10`, borderRadius: 8, padding: "10px 12px", borderLeft: `3px solid ${BLUE}`, marginBottom: 12 }}>
            <div style={{ fontSize: 11, color: BLUE, fontWeight: 600, marginBottom: 3 }}>⌨️ КАК ЗАПУСТИТЬ</div>
            <div style={{ fontSize: 13, color: TEXT, lineHeight: 1.4 }}>{p.howTo}</div>
          </div>
          <div style={{ fontSize: 11, color: DIM, fontWeight: 600, textTransform: "uppercase", letterSpacing: 1, marginBottom: 6 }}>Шаги</div>
          {p.steps.map((s, i) => (
            <div key={i} style={{ display: "flex", gap: 8, padding: "5px 0", fontSize: 13, color: s.done ? "#9ca3af" : RED }}>
              <span style={{ color: s.done ? GREEN : RED, fontSize: 12, flexShrink: 0, marginTop: 2 }}>{s.done ? "✓" : "✗"}</span>
              <span>{s.text}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function App() {
  const [view, setView] = useState("map");
  const [selected, setSelected] = useState(null);
  const [expandedProc, setExpandedProc] = useState(null);

  return (
    <div style={{ background: BG, color: TEXT, minHeight: "100vh", fontFamily: "'DM Sans', -apple-system, sans-serif", padding: "20px 16px" }}>
      <div style={{ maxWidth: 680, margin: "0 auto" }}>

        <div style={{ marginBottom: 20 }}>
          <div style={{ fontSize: 13, color: DIM, textTransform: "uppercase", letterSpacing: 2, marginBottom: 4 }}>Навигатор проекта</div>
          <div style={{ fontSize: 26, fontWeight: 800, color: TEXT }}>{project.name} <span style={{ fontSize: 14, fontWeight: 400, color: DIM }}>v{project.version}</span></div>
          <div style={{ fontSize: 14, color: ACCENT, marginTop: 6, padding: "10px 14px", background: `${ACCENT}10`, borderRadius: 8, borderLeft: `3px solid ${ACCENT}`, lineHeight: 1.5 }}>
            🎯 {project.goal}
          </div>
        </div>

        <div style={{ display: "flex", gap: 4, marginBottom: 20, background: CARD, borderRadius: 10, padding: 3 }}>
          {[
            { id: "map", label: "🗺 Из чего состоит" },
            { id: "process", label: "⚡ Что происходит" },
            { id: "gaps", label: "🚨 Что не готово" },
          ].map(t => (
            <button key={t.id} onClick={() => { setView(t.id); setSelected(null); setExpandedProc(null); }}
              style={{ flex: 1, padding: "10px 0", border: "none", borderRadius: 8, fontSize: 13, fontWeight: 600, cursor: "pointer",
                background: view === t.id ? ACCENT : "transparent", color: view === t.id ? BG : DIM, transition: "all 0.2s" }}>
              {t.label}
            </button>
          ))}
        </div>

        {view === "map" && (
          <div>
            <div style={{ fontSize: 13, color: DIM, marginBottom: 14, lineHeight: 1.5 }}>Из чего состоит проект. Нажми на блок — увидишь что это, зачем тебе, и как пользоваться.</div>
            {project.entities.map((e, i) => (
              <div key={e.id}>
                <EntityCard e={e} selected={selected === i} onClick={() => setSelected(selected === i ? null : i)} />
                {selected === i && <div style={{ margin: "8px 0" }}><EntityDetails e={e} /></div>}
                {i < project.entities.length - 1 && (
                  <div style={{ display: "flex", flexDirection: "column", alignItems: "center", padding: "6px 0" }}>
                    <div style={{ fontSize: 11, color: project.entities[i].color, background: `${project.entities[i].color}15`, padding: "3px 12px", borderRadius: 20 }}>
                      ↓ {project.flow[i]?.label}
                    </div>
                  </div>
                )}
              </div>
            ))}
          </div>
        )}

        {view === "process" && (
          <div>
            <div style={{ fontSize: 13, color: DIM, marginBottom: 14, lineHeight: 1.5 }}>Что можно делать и в каком порядке. Нажми — увидишь зачем, как запустить, и какие шаги внутри.</div>
            <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
              {project.processes.map((p, i) => (
                <div key={i}>
                  <ProcessCard p={p} expanded={expandedProc === i} onClick={() => setExpandedProc(expandedProc === i ? null : i)} />
                  {i < project.processes.length - 1 && <div style={{ display: "flex", justifyContent: "center", padding: "4px 0" }}><span style={{ color: DIM, fontSize: 14 }}>↓</span></div>}
                </div>
              ))}
            </div>
          </div>
        )}

        {view === "gaps" && (
          <div>
            <div style={{ fontSize: 13, color: DIM, marginBottom: 14, lineHeight: 1.5 }}>Что пока не работает или работает не полностью.</div>
            <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
              {project.gaps.map((g, i) => (
                <div key={i} style={{ background: `${sevColor(g.severity)}10`, border: `1px solid ${sevColor(g.severity)}30`, borderRadius: 10, padding: "14px 16px" }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
                    <span style={{ fontSize: 14, fontWeight: 700, color: sevColor(g.severity) }}>{g.label}</span>
                    <span style={{ fontSize: 10, padding: "2px 8px", borderRadius: 8, background: `${sevColor(g.severity)}20`, color: sevColor(g.severity), fontWeight: 600 }}>{sevLabel(g.severity)}</span>
                  </div>
                  <div style={{ fontSize: 13, color: "#9ca3af", lineHeight: 1.5 }}>{g.desc}</div>
                </div>
              ))}
            </div>
            <div style={{ marginTop: 20, padding: 14, borderRadius: 10, background: `${RED}10`, border: `1px solid ${RED}30` }}>
              <div style={{ fontSize: 13, fontWeight: 600, color: RED, marginBottom: 4 }}>⚡ Главная дыра</div>
              <div style={{ fontSize: 13, color: TEXT, lineHeight: 1.5 }}>
                <b>Автоцепочка команд</b> — сейчас ты вручную набираешь 3 команды для каждой фичи. Одна кнопка 'сделай фичу' сэкономила бы кучу времени.
              </div>
            </div>
          </div>
        )}

        <div style={{ marginTop: 24, padding: 14, borderRadius: 10, background: CARD, border: `1px solid ${BORDER}` }}>
          <div style={{ fontSize: 11, color: DIM, marginBottom: 8, fontWeight: 600 }}>ОБОЗНАЧЕНИЯ</div>
          <div style={{ display: "flex", gap: 16, flexWrap: "wrap" }}>
            {[{ icon: "✅", label: "Готово", color: GREEN }, { icon: "⚠️", label: "Частично", color: YELLOW }, { icon: "❌", label: "Не готово", color: RED }].map(s => (
              <div key={s.label} style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 12, color: s.color }}>{s.icon} {s.label}</div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
