<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forge Plugin — Business Entity Map</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Outfit:wght@300;400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0f;
    --bg-panel: #111118;
    --border: #2a2a3a;
    --text: #c8c8d8;
    --text-dim: #6a6a7a;
    --text-bright: #eaeaf4;
    --entity: #4a9eff;
    --entity-glow: #4a9eff30;
    --process: #22d98c;
    --process-glow: #22d98c30;
    --gap: #ff4466;
    --gap-glow: #ff446630;
    --stub: #ff8844;
    --stub-glow: #ff884430;
    --attr: #b366ff;
    --edge-relation: #4a9eff40;
    --edge-process: #22d98c40;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  #container { width: 100%; height: 100%; position: relative; }
  svg { width: 100%; height: 100%; display: block; }

  .node-group { cursor: grab; }
  .node-group:active { cursor: grabbing; }

  /* Панель деталей */
  #detail-panel {
    position: fixed;
    right: -420px;
    top: 0;
    width: 400px;
    height: 100vh;
    background: var(--bg-panel);
    border-left: 1px solid var(--border);
    padding: 24px;
    overflow-y: auto;
    transition: right 0.3s ease;
    z-index: 100;
    font-family: 'JetBrains Mono', monospace;
  }
  #detail-panel.open { right: 0; }
  #detail-panel h2 {
    font-family: 'Outfit', sans-serif;
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 6px;
    color: var(--text-bright);
  }
  #detail-panel .desc {
    color: var(--text-dim);
    font-size: 13px;
    margin-bottom: 16px;
    line-height: 1.5;
  }
  #detail-panel .section-title {
    font-family: 'Outfit', sans-serif;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-dim);
    margin: 16px 0 8px;
  }
  #detail-panel .attr-item {
    font-size: 12px;
    padding: 6px 10px;
    margin: 3px 0;
    background: rgba(179,102,255,0.08);
    border-left: 2px solid var(--attr);
    border-radius: 0 4px 4px 0;
    line-height: 1.5;
  }
  #detail-panel .attr-name { color: var(--attr); font-weight: 600; }
  #detail-panel .relation-item {
    font-size: 12px;
    padding: 6px 10px;
    margin: 3px 0;
    background: rgba(74,158,255,0.08);
    border-left: 2px solid var(--entity);
    border-radius: 0 4px 4px 0;
    line-height: 1.5;
  }
  #detail-panel .step-item {
    font-size: 12px;
    padding: 6px 10px;
    margin: 3px 0;
    border-radius: 4px;
    line-height: 1.5;
  }
  .step-done {
    background: rgba(34,217,140,0.08);
    border-left: 2px solid var(--process);
  }
  .step-missing {
    background: rgba(255,68,102,0.08);
    border-left: 2px solid var(--gap);
  }
  #detail-panel .status-badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 600;
  }
  .status-implemented { background: rgba(34,217,140,0.15); color: var(--process); }
  .status-stub { background: rgba(255,136,68,0.15); color: var(--stub); }
  .status-gap { background: rgba(255,68,102,0.15); color: var(--gap); }

  #close-panel {
    position: absolute;
    top: 16px;
    right: 16px;
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    width: 28px;
    height: 28px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #close-panel:hover { color: var(--text-bright); border-color: var(--text-dim); }

  /* Легенда */
  #legend {
    position: fixed;
    bottom: 20px;
    left: 20px;
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 18px;
    z-index: 50;
    font-size: 12px;
  }
  #legend h3 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-dim);
    margin-bottom: 8px;
  }
  .legend-row { display: flex; align-items: center; gap: 8px; margin: 4px 0; }
  .legend-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* Заголовок */
  #title {
    position: fixed;
    top: 20px;
    left: 20px;
    z-index: 50;
  }
  #title h1 {
    font-size: 22px;
    font-weight: 700;
    color: var(--text-bright);
  }
  #title p {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 4px;
  }

  /* Фильтры */
  #filters {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 50;
    display: flex;
    gap: 6px;
  }
  .filter-btn {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 6px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'Outfit', sans-serif;
    font-size: 12px;
    font-weight: 500;
    transition: all 0.2s;
  }
  .filter-btn.active { color: var(--text-bright); border-color: var(--text); }
  .filter-btn:hover { border-color: var(--text-dim); }
</style>
</head>
<body>
<div id="container">
  <svg id="graph"></svg>
</div>

<div id="title">
  <h1>Forge Plugin — Entity Map</h1>
  <p>Сущности, процессы и связи бизнес-логики</p>
</div>

<div id="filters">
  <button class="filter-btn active" data-filter="all">All</button>
  <button class="filter-btn" data-filter="entity">Сущности</button>
  <button class="filter-btn" data-filter="process">Процессы</button>
  <button class="filter-btn" data-filter="gap">Дыры</button>
</div>

<div id="legend">
  <h3>Легенда</h3>
  <div class="legend-row"><div class="legend-dot" style="background:var(--entity)"></div> Сущность (implemented)</div>
  <div class="legend-row"><div class="legend-dot" style="background:var(--stub)"></div> Сущность (stub)</div>
  <div class="legend-row"><div class="legend-dot" style="background:var(--process)"></div> Процесс</div>
  <div class="legend-row"><div class="legend-dot" style="background:var(--gap)"></div> Дыра / не реализовано</div>
  <div class="legend-row" style="margin-top:8px">
    <svg width="40" height="12"><line x1="0" y1="6" x2="40" y2="6" stroke="var(--edge-relation)" stroke-width="2"/></svg> Связь
  </div>
  <div class="legend-row">
    <svg width="40" height="12"><line x1="0" y1="6" x2="40" y2="6" stroke="var(--edge-process)" stroke-width="2" stroke-dasharray="4,3"/></svg> Процесс-связь
  </div>
</div>

<div id="detail-panel">
  <button id="close-panel">&times;</button>
  <div id="detail-content"></div>
</div>

<script>
const DATA = {
  entities: [
    {
      id: "skill", label: "Skill", type: "entity", status: "implemented",
      description: "Воркфлоу-паттерн, направляющий Claude через процесс разработки. 23 скилла — от TDD до деплоя.",
      attributes: [
        { name: "name", value: "kebab-case: brainstorming, test-driven-development, systematic-debugging..." },
        { name: "description", value: "Начинается с 'Use when...' — условие активации, max 1024 символов" },
        { name: "trigger_keywords", value: "bug/fix/error → debugging, test/tdd → TDD, plan → writing-plans" },
        { name: "type", value: "rigid (TDD — шаг влево нельзя) | flexible (ui-ux-design — адаптируй)" },
        { name: "stage", value: "pre-implementation | execution | verification" }
      ],
      relations: [
        "содержится в → Skill Catalog (.forge/skills-catalog.yml)",
        "вызывается из → Session (через Skill tool)",
        "управляется → Review Gate (hard gates блокируют пропуск)"
      ]
    },
    {
      id: "session", label: "Session", type: "entity", status: "implemented",
      description: "Рабочая сессия Claude с пользователем. Начинается при открытии Claude Code, заканчивается при закрытии.",
      attributes: [
        { name: "started", value: "timestamp начала" },
        { name: "goal", value: "Цель сессии — что хотим сделать сегодня" },
        { name: "done", value: "Список выполненных шагов" },
        { name: "now", value: "Текущая задача прямо сейчас" },
        { name: "next", value: "Что делать дальше" },
        { name: "errors", value: "Ошибки за сессию (для dead-ends)" }
      ],
      relations: [
        "загружает → Context Layer (L0 автоматически, L1 по тегам)",
        "активирует → Skill (по keyword matching или вручную)",
        "записывает → Journal (.forge/journal.yml)"
      ]
    },
    {
      id: "context", label: "Context Layer", type: "entity", status: "implemented",
      description: "Трёхуровневая система контекста. L0 всегда, L1 по необходимости, L2 редко. Экономит токены.",
      attributes: [
        { name: "L0", value: "~200 токенов, ВСЕГДА загружается. index.yml: цель, стадия, прогресс, каталог" },
        { name: "L1", value: "~500-2000 токенов ПО ТЕГАМ. map, conventions, status, decisions, dead-ends, journal, learnings" },
        { name: "L2", value: "Без лимита, РЕДКО. Полные spec.yml, планы, детали dead-ends" },
        { name: "tags", value: "Ключевые слова для автоматического маппинга задачи на L1 файлы" },
        { name: "token_budget", value: "Типичная задача: 400-700 токенов контекста" }
      ],
      relations: [
        "L0 содержит → Project Metadata + Catalog",
        "L1 содержит → Map, Conventions, Status, Decisions, Dead Ends, Journal, Learnings",
        "L2 содержит → Specs, Plans, Dead End Details"
      ]
    },
    {
      id: "plan", label: "Plan", type: "entity", status: "implemented",
      description: "Детальный план реализации. Создаётся ПОСЛЕ brainstorm. Содержит задачи по 2-5 минут каждая.",
      attributes: [
        { name: "goal", value: "Одно предложение — что именно реализуем" },
        { name: "architecture", value: "Как устроено: компоненты, потоки данных" },
        { name: "tasks", value: "Список задач. Каждая: файлы + тест + код + проверка" },
        { name: "tech_stack", value: "Языки, фреймворки, инструменты" },
        { name: "file", value: ".forge/plans/YYYY-MM-DD-feature.md" }
      ],
      relations: [
        "создаётся после → Brainstorm (GATE: дизайн одобрен)",
        "содержит → Task (атомарные шаги)",
        "выполняется через → Subagent | вручную"
      ]
    },
    {
      id: "task", label: "Task", type: "entity", status: "implemented",
      description: "Атомарная единица работы. 2-5 минут. Одна задача = один коммит.",
      attributes: [
        { name: "files", value: "Конкретные файлы которые нужно создать/изменить" },
        { name: "failing_test", value: "Какой тест написать ПЕРВЫМ (TDD: RED)" },
        { name: "minimal_code", value: "Минимальный код чтобы тест прошёл (GREEN)" },
        { name: "verification", value: "Как убедиться что работает (REFACTOR + check)" }
      ],
      relations: [
        "принадлежит → Plan",
        "выполняется → Subagent (implementer)",
        "проходит → Review Gate (spec + quality)"
      ]
    },
    {
      id: "deadend", label: "Dead End", type: "entity", status: "implemented",
      description: "Провальный подход. Записывается СРАЗУ чтобы не повторять ошибку. Хранится вечно.",
      attributes: [
        { name: "date", value: "Когда пробовали" },
        { name: "summary", value: "Что пробовали (1-2 предложения)" },
        { name: "why_failed", value: "Почему не сработало — конкретная причина" },
        { name: "tags", value: "Для поиска: auth, performance, migration..." }
      ],
      relations: [
        "предотвращает повтор в → Session (L1 загрузка по тегам)",
        "записывается при → Debugging (Phase 1-4)",
        "детали в → .forge/dead-ends/*.md (L2)"
      ]
    },
    {
      id: "decision", label: "Decision", type: "entity", status: "implemented",
      description: "Архитектурное решение с обоснованием. 'Почему мы выбрали X а не Y'.",
      attributes: [
        { name: "date", value: "Когда приняли решение" },
        { name: "decision", value: "Что решили" },
        { name: "why", value: "Почему именно так — ключевые аргументы" },
        { name: "alternatives", value: "Что рассматривали и отвергли" }
      ],
      relations: [
        "влияет на → Plan (ограничивает выбор)",
        "влияет на → Convention (определяет стиль)",
        "записывается при → Brainstorm, Implementation"
      ]
    },
    {
      id: "subagent", label: "Subagent", type: "entity", status: "implemented",
      description: "Свежая сессия Claude для одной задачи. Чистый контекст, нет 'загрязнения' от предыдущих задач.",
      attributes: [
        { name: "role", value: "implementer | spec-reviewer | quality-reviewer | documenter" },
        { name: "brief", value: "ПОЛНЫЙ контекст задачи — субагент не видит историю" },
        { name: "stack_hints", value: "Подсказки: python.md, react.md, go.md, typescript.md..." },
        { name: "model", value: "implementer: inherit, documenter: sonnet (дешевле)" }
      ],
      relations: [
        "выполняет → Task (один субагент = одна задача)",
        "проверяется → Review Gate (spec → quality)",
        "оркестрируется → Controller (главный Claude)"
      ]
    },
    {
      id: "gate", label: "Review Gate", type: "entity", status: "implemented",
      description: "Обязательная проверка. Нельзя пропустить. Блокирует прогресс пока не пройдена.",
      attributes: [
        { name: "type", value: "design-approved | test-passing | spec-compliance | code-quality" },
        { name: "blocking", value: "ВСЕГДА true — пропуск невозможен" },
        { name: "enforcement", value: "Red flags таблица ловит попытки обойти" }
      ],
      relations: [
        "блокирует → Task completion, Branch merge, Plan execution",
        "выполняется → Subagent (reviewer) или автоматически (тесты)"
      ]
    },
    {
      id: "hook", label: "Hook", type: "entity", status: "implemented",
      description: "Скрипт, автоматически запускаемый Claude Code. Инжектирует контекст в каждый промпт.",
      attributes: [
        { name: "SessionStart", value: "Загружает using-forge скилл при старте" },
        { name: "UserPromptSubmit", value: "Инжектирует L0 + keyword → skill hint" },
        { name: "Stop", value: "Звуковое уведомление (случайный MP3)" },
        { name: "PermissionRequest", value: "Звук 'разрешение?' при запросе прав" }
      ],
      relations: [
        "инжектирует → Context Layer (L0 в каждый промпт)",
        "подсказывает → Skill (keyword matching)",
        "оповещает → звук (paplay MP3)"
      ]
    },
    {
      id: "marketplace", label: "Marketplace", type: "entity", status: "stub",
      description: "Каталог плагинов и скиллов. Локальный поиск работает, удалённый API — нет.",
      attributes: [
        { name: "name", value: "forge, claude-plugins-official" },
        { name: "source", value: "GitHub repo (anton-ai5010/forge)" },
        { name: "plugins", value: "Список плагинов с версиями" }
      ],
      relations: [
        "содержит → Plugin (forge v5.5.0)",
        "ищется через → /forge:discover (только локально)"
      ]
    },

    // Процессы
    {
      id: "proc_start", label: "Session Start", type: "process",
      description: "Что происходит когда ты открываешь Claude Code в проекте с .forge/",
      steps: [
        { text: "Hook session-start.sh загружает using-forge скилл", done: true },
        { text: "Hook context-inject.sh инжектирует L0 из .forge/index.yml", done: true },
        { text: "Keyword matching подсказывает релевантный скилл", done: true },
        { text: "Автоматическая загрузка L1 по контексту задачи", done: false }
      ],
      connects: ["hook", "context", "skill", "session"]
    },
    {
      id: "proc_bpe", label: "Brainstorm → Plan → Execute", type: "process",
      description: "Главный процесс: от идеи до рабочего кода. Обязателен для любой новой фичи.",
      steps: [
        { text: "/forge:brainstorm — 3 агента: analyst, technologist, critic", done: true },
        { text: "Требования: must-have vs nice-to-have + acceptance criteria", done: true },
        { text: "GATE: дизайн-документ одобрен пользователем", done: true },
        { text: "/forge:write-plan — декомпозиция на задачи по 2-5 мин", done: true },
        { text: "/forge:execute-plan — субагенты выполняют по TDD", done: true },
        { text: "RED-GREEN-REFACTOR цикл на каждую задачу", done: true },
        { text: "Review gate (spec + quality) после каждой задачи", done: true },
        { text: "Автоматический skill chaining (сейчас вручную)", done: false }
      ],
      connects: ["plan", "task", "subagent", "gate", "skill"]
    },
    {
      id: "proc_debug", label: "Debug Flow", type: "process",
      description: "Расследование бага. 4 фазы. Нельзя чинить без расследования.",
      steps: [
        { text: "Phase 1: Расследование — воспроизвести, собрать улики", done: true },
        { text: "Phase 2: Гипотеза — что может быть причиной", done: true },
        { text: "Phase 3: Верификация — доказать гипотезу", done: true },
        { text: "Phase 4: Фикс — минимальное исправление", done: true },
        { text: "GATE: нет фикса без Phase 1", done: true },
        { text: "Запись Dead End если подход провалился", done: true }
      ],
      connects: ["skill", "deadend", "session"]
    },
    {
      id: "proc_sync", label: "Documentation Sync", type: "process",
      description: "Обновление документации после кода. Субагент читает diff и обновляет .forge/",
      steps: [
        { text: "Git diff определяет что изменилось", done: true },
        { text: "Субагент (sonnet) обновляет library/spec.yml", done: true },
        { text: "Обновление map.yml, status.yml", done: true },
        { text: "Запись decisions, dead-ends, learnings", done: true },
        { text: "Запись в journal.yml", done: true },
        { text: "Автоизвлечение dead-ends из логов ошибок", done: false },
        { text: "Извлечение learnings из коммитов", done: false }
      ],
      connects: ["context", "decision", "deadend", "subagent"]
    },
    {
      id: "proc_subagent", label: "Subagent Orchestration", type: "process",
      description: "Как выполняется план через субагентов. Свежий контекст на каждую задачу.",
      steps: [
        { text: "Controller (главный Claude) читает план ОДИН раз", done: true },
        { text: "На каждую задачу — СВЕЖИЙ субагент (чистый контекст)", done: true },
        { text: "Implementer: TDD + коммит + self-review", done: true },
        { text: "Spec reviewer: код соответствует спецификации?", done: true },
        { text: "Quality reviewer: код качественный?", done: true },
        { text: "Documenter (sonnet): обновление .forge/", done: true },
        { text: "Финальный code review всей реализации", done: true }
      ],
      connects: ["subagent", "task", "gate", "plan"]
    },

    // Дыры
    {
      id: "gap_marketplace", label: "Marketplace API", type: "gap",
      description: "Discover ищет только по локальным маркетплейсам. Удалённый поиск и установка не работают."
    },
    {
      id: "gap_chaining", label: "Skill Chaining", type: "gap",
      description: "Пользователь вручную вызывает следующий скилл. Нет автоматической цепочки brainstorm → plan → execute."
    },
    {
      id: "gap_learning", label: "Learning Extraction", type: "gap",
      description: "Не извлекает инсайты автоматически из ошибок, коммитов, паттернов кода."
    },
    {
      id: "gap_crossproject", label: "Cross-Project Patterns", type: "gap",
      description: "Нет переноса learnings и dead-ends между проектами. Каждый .forge/ изолирован."
    },
    {
      id: "gap_autodetect", label: "Skill Auto-Detection", type: "gap",
      description: "Только keyword matching в хуке. Нет семантического понимания когда какой скилл нужен."
    }
  ],

  edges: [
    // Основные связи между сущностями
    { source: "session", target: "context", label: "загружает" },
    { source: "session", target: "skill", label: "активирует" },
    { source: "hook", target: "context", label: "инжектирует L0" },
    { source: "hook", target: "skill", label: "подсказывает" },
    { source: "plan", target: "task", label: "содержит" },
    { source: "task", target: "subagent", label: "выполняется" },
    { source: "subagent", target: "gate", label: "проверяется" },
    { source: "gate", target: "task", label: "блокирует" },
    { source: "gate", target: "plan", label: "блокирует" },
    { source: "skill", target: "gate", label: "управляется" },
    { source: "decision", target: "plan", label: "влияет" },
    { source: "deadend", target: "session", label: "предотвращает" },
    { source: "context", target: "deadend", label: "хранит (L1)" },
    { source: "context", target: "decision", label: "хранит (L1)" },
    { source: "marketplace", target: "skill", label: "содержит" },

    // Процесс-связи
    { source: "proc_start", target: "session", label: "", type: "process" },
    { source: "proc_start", target: "hook", label: "", type: "process" },
    { source: "proc_bpe", target: "plan", label: "", type: "process" },
    { source: "proc_bpe", target: "subagent", label: "", type: "process" },
    { source: "proc_debug", target: "deadend", label: "", type: "process" },
    { source: "proc_debug", target: "skill", label: "", type: "process" },
    { source: "proc_sync", target: "context", label: "", type: "process" },
    { source: "proc_sync", target: "subagent", label: "", type: "process" },
    { source: "proc_subagent", target: "subagent", label: "", type: "process" },
    { source: "proc_subagent", target: "gate", label: "", type: "process" },

    // Дыры
    { source: "gap_marketplace", target: "marketplace", label: "", type: "gap" },
    { source: "gap_chaining", target: "skill", label: "", type: "gap" },
    { source: "gap_learning", target: "deadend", label: "", type: "gap" },
    { source: "gap_crossproject", target: "context", label: "", type: "gap" },
    { source: "gap_autodetect", target: "hook", label: "", type: "gap" }
  ]
};

// --- D3 GRAPH ---
const width = window.innerWidth;
const height = window.innerHeight;

const svg = d3.select("#graph");
const g = svg.append("g");

// Zoom
const zoom = d3.zoom()
  .scaleExtent([0.3, 3])
  .on("zoom", (e) => g.attr("transform", e.transform));
svg.call(zoom);

// Arrows
const defs = svg.append("defs");
["relation", "process", "gap"].forEach(type => {
  const colors = { relation: "#4a9eff", process: "#22d98c", gap: "#ff4466" };
  defs.append("marker")
    .attr("id", `arrow-${type}`)
    .attr("viewBox", "0 -5 10 10")
    .attr("refX", 28)
    .attr("refY", 0)
    .attr("markerWidth", 6)
    .attr("markerHeight", 6)
    .attr("orient", "auto")
    .append("path")
    .attr("d", "M0,-5L10,0L0,5")
    .attr("fill", colors[type] + "80");
});

// Nodes & edges
const nodes = DATA.entities.map(e => ({ ...e }));
const edges = DATA.edges.map(e => ({ ...e }));

const nodeMap = {};
nodes.forEach(n => nodeMap[n.id] = n);

// Force simulation
const simulation = d3.forceSimulation(nodes)
  .force("link", d3.forceLink(edges).id(d => d.id).distance(180).strength(0.4))
  .force("charge", d3.forceManyBody().strength(-600))
  .force("center", d3.forceCenter(width / 2, height / 2))
  .force("collision", d3.forceCollide().radius(60));

// Draw edges
const link = g.append("g").selectAll("line")
  .data(edges)
  .join("line")
  .attr("stroke", d => {
    if (d.type === "process") return "var(--edge-process)";
    if (d.type === "gap") return "var(--gap-glow)";
    return "var(--edge-relation)";
  })
  .attr("stroke-width", d => d.type === "gap" ? 1.5 : 2)
  .attr("stroke-dasharray", d => (d.type === "process" || d.type === "gap") ? "6,4" : "none")
  .attr("marker-end", d => `url(#arrow-${d.type || "relation"})`);

// Edge labels
const linkLabel = g.append("g").selectAll("text")
  .data(edges.filter(e => e.label))
  .join("text")
  .text(d => d.label)
  .attr("font-size", 10)
  .attr("fill", "var(--text-dim)")
  .attr("font-family", "'JetBrains Mono', monospace")
  .attr("text-anchor", "middle")
  .attr("dy", -6);

// Node colors
function nodeColor(d) {
  if (d.type === "gap") return "var(--gap)";
  if (d.type === "process") return "var(--process)";
  if (d.status === "stub") return "var(--stub)";
  return "var(--entity)";
}
function nodeGlow(d) {
  if (d.type === "gap") return "var(--gap-glow)";
  if (d.type === "process") return "var(--process-glow)";
  if (d.status === "stub") return "var(--stub-glow)";
  return "var(--entity-glow)";
}
function nodeRadius(d) {
  if (d.type === "process") return 26;
  if (d.type === "gap") return 18;
  return 22;
}

// Draw nodes
const nodeGroup = g.append("g").selectAll("g")
  .data(nodes)
  .join("g")
  .attr("class", "node-group")
  .call(d3.drag()
    .on("start", (e, d) => { if (!e.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
    .on("drag", (e, d) => { d.fx = e.x; d.fy = e.y; })
    .on("end", (e, d) => { if (!e.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; })
  )
  .on("click", (e, d) => showDetail(d));

// Glow
nodeGroup.append("circle")
  .attr("r", d => nodeRadius(d) + 8)
  .attr("fill", d => nodeGlow(d))
  .attr("opacity", 0.5);

// Main circle
nodeGroup.append("circle")
  .attr("r", d => nodeRadius(d))
  .attr("fill", "var(--bg)")
  .attr("stroke", d => nodeColor(d))
  .attr("stroke-width", 2);

// Icon
nodeGroup.append("text")
  .attr("text-anchor", "middle")
  .attr("dy", 1)
  .attr("font-size", d => d.type === "gap" ? 14 : 16)
  .text(d => {
    const icons = {
      entity: { skill: "S", session: "Se", context: "C", plan: "P", task: "T",
                deadend: "DE", decision: "D", subagent: "SA", gate: "G", hook: "H", marketplace: "M" },
      process: { proc_start: "1", proc_bpe: "2", proc_debug: "3", proc_sync: "4", proc_subagent: "5" },
      gap: { gap_marketplace: "!", gap_chaining: "!", gap_learning: "!", gap_crossproject: "!", gap_autodetect: "!" }
    };
    return (icons[d.type] || {})[d.id] || "?";
  })
  .attr("fill", d => nodeColor(d))
  .attr("font-family", "'JetBrains Mono', monospace")
  .attr("font-weight", 600);

// Label
nodeGroup.append("text")
  .attr("text-anchor", "middle")
  .attr("dy", d => nodeRadius(d) + 16)
  .attr("font-size", 11)
  .attr("fill", "var(--text)")
  .attr("font-family", "'Outfit', sans-serif")
  .attr("font-weight", 500)
  .text(d => d.label);

// Simulation tick
simulation.on("tick", () => {
  link.attr("x1", d => d.source.x).attr("y1", d => d.source.y)
      .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
  linkLabel.attr("x", d => (d.source.x + d.target.x) / 2)
           .attr("y", d => (d.source.y + d.target.y) / 2);
  nodeGroup.attr("transform", d => `translate(${d.x},${d.y})`);
});

// --- DETAIL PANEL ---
function showDetail(d) {
  const panel = document.getElementById("detail-panel");
  const content = document.getElementById("detail-content");
  let html = "";

  const color = d.type === "gap" ? "var(--gap)" : d.type === "process" ? "var(--process)" :
                d.status === "stub" ? "var(--stub)" : "var(--entity)";

  html += `<h2 style="color:${color}">${d.label}</h2>`;
  html += `<div class="desc">${d.description}</div>`;

  if (d.status) {
    const cls = d.status === "implemented" ? "status-implemented" :
                d.status === "stub" ? "status-stub" : "status-gap";
    html += `<span class="status-badge ${cls}">${d.status}</span>`;
  }

  if (d.attributes) {
    html += `<div class="section-title">Атрибуты</div>`;
    d.attributes.forEach(a => {
      html += `<div class="attr-item"><span class="attr-name">${a.name}:</span> ${a.value}</div>`;
    });
  }

  if (d.relations) {
    html += `<div class="section-title">Связи</div>`;
    d.relations.forEach(r => {
      html += `<div class="relation-item">${r}</div>`;
    });
  }

  if (d.steps) {
    html += `<div class="section-title">Шаги</div>`;
    d.steps.forEach(s => {
      const cls = s.done ? "step-done" : "step-missing";
      const icon = s.done ? "&#10003;" : "&#10007;";
      html += `<div class="step-item ${cls}">${icon} ${s.text}</div>`;
    });
  }

  if (d.connects) {
    html += `<div class="section-title">Задействует</div>`;
    d.connects.forEach(c => {
      const n = nodeMap[c];
      if (n) html += `<div class="relation-item" style="cursor:pointer" onclick="clickNode('${c}')">${n.label}</div>`;
    });
  }

  content.innerHTML = html;
  panel.classList.add("open");
}

function clickNode(id) {
  const n = nodeMap[id];
  if (n) showDetail(n);
}

document.getElementById("close-panel").onclick = () => {
  document.getElementById("detail-panel").classList.remove("open");
};

// --- FILTERS ---
document.querySelectorAll(".filter-btn").forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    const filter = btn.dataset.filter;

    nodeGroup.style("opacity", d => {
      if (filter === "all") return 1;
      if (filter === "entity" && d.type === "entity") return 1;
      if (filter === "process" && d.type === "process") return 1;
      if (filter === "gap" && d.type === "gap") return 1;
      return 0.1;
    });
    link.style("opacity", d => {
      if (filter === "all") return 1;
      const s = typeof d.source === "object" ? d.source : nodeMap[d.source];
      const t = typeof d.target === "object" ? d.target : nodeMap[d.target];
      if (filter === "entity" && s.type === "entity" && t.type === "entity") return 1;
      if (filter === "process" && (s.type === "process" || t.type === "process")) return 1;
      if (filter === "gap" && (s.type === "gap" || t.type === "gap")) return 1;
      if (filter !== "all") return 0.05;
      return 1;
    });
    linkLabel.style("opacity", d => {
      if (filter === "all") return 1;
      return 0.05;
    });
  };
});

// Initial zoom to fit
setTimeout(() => {
  svg.call(zoom.transform, d3.zoomIdentity.translate(width * 0.1, height * 0.1).scale(0.85));
}, 500);
</script>
</body>
</html>
